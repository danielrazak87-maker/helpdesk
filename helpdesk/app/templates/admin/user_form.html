{% extends "base.html" %}
{% block title %}{{ action }} User — Kayfalah Helpdesk{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <a href="{{ url_for('admin.users') }}" class="back-link">← Back to Users</a>
    <h1 class="page-title">{{ action }} User</h1>
  </div>
</div>
<div class="card" style="max-width:600px">
  <div class="card-body">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="form-group">
        <label>Full Name <span class="required">*</span></label>
        <input name="full_name" class="form-control" value="{{ user.full_name if user else '' }}" required/>
      </div>
      {% if action == 'Create' %}
      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        <input type="email" name="email" class="form-control" required/>
      </div>
      {% endif %}
      <div class="form-row">
        <div class="form-group">
          <label>Role</label>
          <select name="role" class="form-control">
            {% for r in ['user','engineer','admin'] %}
            <option value="{{ r }}" {% if user and user.role == r %}selected{% endif %}>{{ r.title() }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Department</label>
          <input name="department" class="form-control" value="{{ user.department if user else '' }}"/>
        </div>
      </div>
      <div class="form-group">
        <label>Client</label>
        <select name="client_id" class="form-control">
          <option value="">— No Client —</option>
          {% for c in clients %}
          <option value="{{ c.id }}" {% if user and user.client_id == c.id %}selected{% endif %}>{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input name="phone" class="form-control" value="{{ user.phone if user else '' }}"/>
      </div>
      <div class="form-group">
        <label>Password {% if action=='Edit' %}<span class="text-muted text-sm">(leave blank to keep current)</span>{% else %}<span class="required">*</span>{% endif %}</label>
        <input type="password" name="password" class="form-control" {% if action=='Create' %}required{% endif %}/>
      </div>
      {% if action == 'Edit' %}
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" name="is_active" {% if user.is_active %}checked{% endif %}/> Active
        </label>
      </div>
      {% endif %}
      <div class="form-actions">
        <a href="{{ url_for('admin.users') }}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">{{ action }} User</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
