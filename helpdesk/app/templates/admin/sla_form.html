{% extends "base.html" %}
{% block title %}{{ 'Edit' if policy else 'Create' }} SLA — Admin{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <a href="{{ url_for('admin.sla_list') }}" class="back-link">← Back</a>
    <h1 class="page-title">{{ 'Edit' if policy else 'Create' }} SLA Policy</h1>
  </div>
</div>
<div class="card" style="max-width:500px">
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>Policy Name</label>
        <input name="name" class="form-control" value="{{ policy.name if policy else '' }}" required/>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select name="priority" class="form-control">
          {% for p in priorities %}
          <option value="{{ p }}" {% if policy and policy.priority==p %}selected{% endif %}>{{ p.title() }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Response Time (minutes)</label>
          <input type="number" name="response_time_mins" class="form-control" value="{{ policy.response_time_mins if policy else 60 }}" min="1" required/>
        </div>
        <div class="form-group">
          <label>Resolution Time (minutes)</label>
          <input type="number" name="resolution_time_mins" class="form-control" value="{{ policy.resolution_time_mins if policy else 480 }}" min="1" required/>
        </div>
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" name="escalate_on_breach" {% if not policy or policy.escalate_on_breach %}checked{% endif %}/> Escalate on SLA Breach
        </label>
      </div>
      <div class="form-actions">
        <a href="{{ url_for('admin.sla_list') }}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">Save Policy</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
