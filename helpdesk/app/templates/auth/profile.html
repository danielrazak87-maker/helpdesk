{% extends "base.html" %}
{% block title %}My Profile — Kayfalah Helpdesk{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">My Profile</h1>
</div>
<div class="card" style="max-width:600px">
  <div class="card-body">
    <div class="profile-avatar-row">
      <div class="profile-avatar">{{ current_user.full_name[0].upper() }}</div>
      <div>
        <h3>{{ current_user.full_name }}</h3>
        <span class="badge badge-{{ current_user.role }}">{{ current_user.role.title() }}</span>
      </div>
    </div>
    <form method="POST" action="{{ url_for('auth.profile') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="form-group">
        <label>Full Name</label>
        <input name="full_name" class="form-control" value="{{ current_user.full_name }}" required/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input class="form-control" value="{{ current_user.email }}" disabled/>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input name="phone" class="form-control" value="{{ current_user.phone or '' }}" placeholder="+60 12 345 6789"/>
      </div>
      <div class="form-group">
        <label>Department</label>
        <input name="department" class="form-control" value="{{ current_user.department or '' }}"/>
      </div>
      <hr/>
      <h4 style="margin-bottom:1rem">Change Password</h4>
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" name="current_password" class="form-control"/>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" class="form-control"/>
      </div>
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
  </div>
</div>
{% endblock %}
