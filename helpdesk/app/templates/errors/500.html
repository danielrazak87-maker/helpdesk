{% extends "base.html" %}
{% block title %}Server Error — Kayfalah Helpdesk{% endblock %}
{% block content %}
<div class="error-page">
  <div class="error-card">
    <div class="error-code">500</div>
    <div class="error-icon">⚡</div>
    <h1 class="error-title">Something Went Wrong</h1>
    <p class="error-desc">An unexpected error occurred. Our team has been notified. Please try again later.</p>
    <div class="error-actions">
      <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary">Go to Dashboard</a>
      <a href="javascript:location.reload()" class="btn btn-ghost">Try Again</a>
    </div>
  </div>
</div>
{% endblock %}
