{% extends "base.html" %}
{% block title %}Page Not Found — Kayfalah Helpdesk{% endblock %}
{% block content %}
<div class="error-page">
  <div class="error-card">
    <div class="error-code">404</div>
    <div class="error-icon">🔍</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">The page you're looking for doesn't exist or has been moved.</p>
    <div class="error-actions">
      <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary">Go to Dashboard</a>
      <a href="javascript:history.back()" class="btn btn-ghost">Go Back</a>
    </div>
  </div>
</div>
{% endblock %}
