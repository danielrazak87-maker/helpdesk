{% extends "base.html" %}
{% block title %}Access Denied — Kayfalah Helpdesk{% endblock %}
{% block content %}
<div class="error-page">
  <div class="error-card">
    <div class="error-code">403</div>
    <div class="error-icon">🚫</div>
    <h1 class="error-title">Access Denied</h1>
    <p class="error-desc">You don't have permission to access this resource. If you believe this is a mistake, contact your administrator.</p>
    <div class="error-actions">
      <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary">Go to Dashboard</a>
      <a href="javascript:history.back()" class="btn btn-ghost">Go Back</a>
    </div>
  </div>
</div>
{% endblock %}
